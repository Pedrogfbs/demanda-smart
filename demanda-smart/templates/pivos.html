<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demand Smart - Gestão de Pivôs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

:root{
    --primary:#0d1b2a;
    --secondary:#1b263b;
    --success:#198754;
    --bg:#f5f7fa;
}

body{
    background:var(--bg);
    font-family:'Segoe UI',sans-serif;
}

.sidebar{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100vh;
    background:var(--primary);
    color:white;
    padding:25px;
}

.logo{
    font-size:1.4rem;
    font-weight:700;
    margin-bottom:35px;
}

.sidebar a{
    display:block;
    text-decoration:none;
    color:#d8dee9;
    padding:12px 15px;
    margin-bottom:8px;
    border-radius:10px;
}

.sidebar a:hover,
.sidebar a.active{
    background:var(--secondary);
    color:white;
}

.content{
    margin-left:260px;
    padding:35px;
}

.page-title{
    font-weight:700;
    color:var(--primary);
}

.page-subtitle{
    color:#666;
    margin-bottom:30px;
}

.card-custom{
    border:none;
    border-radius:18px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.card-header-custom{
    background:white;
    border-bottom:1px solid #eee;
    font-weight:600;
    padding:18px;
}

.form-control,
.form-select{
    border-radius:10px;
    min-height:45px;
}

.form-label{
    font-weight:600;
}

.btn-save{
    background:#198754;
    border:none;
    border-radius:10px;
    padding:12px;
    color:white;
    width:100%;
}

    background:#157347;
}

.table{
    vertical-align:middle;
}

</style>
</head>

<body>

<div class="sidebar">

    <div class="logo">
        ⚡ Demand Smart
    </div>

    <a href="/">📊 Dashboard</a>
    <a href="/pivos" class="active">💧 Pivôs</a>
    <a href="/manutencao">🔧 Manutenção</a>
    <a href="/relatorios">📄 Relatórios</a>
    <a href="/financeiro">💰 Financeiro</a>

</div>

<div class="content">

    <h2 class="page-title">
        Gestão de Pivôs
    </h2>

    <p class="page-subtitle">
        Cadastro e gerenciamento dos pivôs.
    </p>

    <div class="card card-custom mb-4">

        <div class="card-header card-header-custom">
            ➕ Cadastro de Pivô
        </div>

        <div class="card-body">

            <form id="formCadastroPivo">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nome</label>
                        <input type="text" id="nome" class="form-control" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fabricante</label>
                        <input type="text" id="fabricante" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Modelo</label>
                        <input type="text" id="modelo" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Cultura</label>
                        <input type="text" id="cultura" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Potência (kW)</label>
                        <input type="number" id="potencia_kw" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Área (ha)</label>
                        <input type="number" id="area_irrigada_ha" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Comprimento (m)</label>
                        <input type="number" id="comprimento_m" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Vazão (m³/h)</label>
                        <input type="number" id="vazao_m3_h" class="form-control">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tensão</label>
                        <select id="tensao_v" class="form-select">
                            <option value="220">220V</option>
                            <option value="380" selected>380V</option>
                            <option value="440">440V</option>
                        </select>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Setor</label>
                        <input type="text" id="setor" class="form-control">
                    </div>

                </div>

                <button type="submit" class="btn-save">
                    <i class="fa fa-save"></i>
                    Salvar Pivô
                </button>

            </form>

            <div id="mensagemFeedback" class="mt-3"></div>

        </div>

    </div>

    <div class="card card-custom">

        <div class="card-header card-header-custom">
            📋 Pivôs Cadastrados
        </div>

        <div class="card-body">

            <table class="table table-hover">

                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Potência</th>
                        <th>Área</th>
                        <th>Setor</th>
                        <th width="160">Ações</th>
                    </tr>
                </thead>

                <tbody id="tabelaPivos"></tbody>

            </table>

        </div>

    </div>

</div>

<script>

let idEditando = null;

async function carregarPivos(){

    const response = await fetch('/api/pivos');
    const dados = await response.json();

    let html = '';

    dados.pivos.forEach(p => {

        html += `
        <tr>

            <td>${p.id}</td>
            <td>${p.nome}</td>
            <td>${p.potencia_kw} kW</td>
            <td>${p.area_irrigada_ha || 0} ha</td>
            <td>${p.setor || '-'}</td>

            <td>

                <button
                    class="btn btn-warning btn-sm me-2"
                    onclick="editarPivo(${p.id})">

                    <i class="fa fa-pen"></i>

                </button>

                <button
                    class="btn btn-danger btn-sm"
                    onclick="excluirPivo(${p.id})">

                    <i class="fa fa-trash"></i>

                </button>

            </td>

        </tr>
        `;
    });

    document.getElementById('tabelaPivos').innerHTML = html;
}

async function editarPivo(id){

    const response =
        await fetch(`/api/pivos/${id}`);

    const p =
        await response.json();

    idEditando = id;

    nome.value = p.nome;
    fabricante.value = p.fabricante;
    modelo.value = p.modelo;
    cultura.value = p.cultura;
    potencia_kw.value = p.potencia_kw;
    area_irrigada_ha.value = p.area_irrigada_ha;
    comprimento_m.value = p.comprimento_m;
    vazao_m3_h.value = p.vazao_m3_h;
    tensao_v.value = p.tensao_v;
    setor.value = p.setor;

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

}

async function excluirPivo(id){

    if(!confirm("Deseja excluir este pivô?")){
        return;
    }

    await fetch(`/api/pivos/${id}`,{
        method:"DELETE"
    });

    carregarPivos();
}

document
.getElementById("formCadastroPivo")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const dados = {

        nome:nome.value,
        fabricante:fabricante.value,
        modelo:modelo.value,
        cultura:cultura.value,
        potencia_kw:Number(potencia_kw.value),
        area_irrigada_ha:Number(area_irrigada_ha.value || 0),
        comprimento_m:Number(comprimento_m.value || 0),
        vazao_m3_h:Number(vazao_m3_h.value || 0),
        tensao_v:Number(tensao_v.value),
        setor:setor.value

    };

    let response;

    if(idEditando){

        response = await fetch(
            `/api/pivos/${idEditando}`,
            {
                method:"PUT",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(dados)
            }
        );

    }else{

        response = await fetch(
            "/api/pivos",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify(dados)
            }
        );

    }

    if(response.ok){

        mensagemFeedback.innerHTML =
        '<div class="alert alert-success">Registro salvo com sucesso.</div>';

        formCadastroPivo.reset();

        idEditando = null;

        carregarPivos();

    }else{

        mensagemFeedback.innerHTML =
        '<div class="alert alert-danger">Erro ao salvar.</div>';

    }

});

carregarPivos();

</script>

</body>
</html>
```
