<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Demand Smart Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    background:#f5f7fa;
    font-family:Segoe UI,Tahoma,Geneva,Verdana,sans-serif;
}

.sidebar{
    width:250px;
    height:100vh;
    position:fixed;
    top:0;
    left:0;
    background:#0d1b2a;
    color:white;
    padding:20px;
}

.sidebar h4{
    margin-bottom:25px;
}

.sidebar a{
    display:block;
    color:#cbd5e1;
    text-decoration:none;
    padding:10px;
    border-radius:8px;
    margin-bottom:5px;
}

.sidebar a:hover,
.sidebar a.active{
    background:#1b263b;
    color:white;
}

.content{
    margin-left:250px;
    padding:25px;
}

.card-status{
    border:none;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.valor{
    font-size:1.5rem;
    font-weight:bold;
}

.verde{
    color:#198754;
}

.azul{
    color:#0d6efd;
}

.vermelho{
    color:#dc3545;
}

canvas{
    max-height:350px;
}

.lista-pivos{
    list-style:none;
    padding-left:0;
}

.lista-pivos li{
    padding:8px;
    border-bottom:1px solid #eee;
}

</style>
</head>

<body>

<div class="sidebar">

    <h4>⚡ Demand Smart</h4>

    <a href="/" class="active">🏠 Dashboard</a>
    <a href="/pivos">💧 Pivôs</a>
    <a href="/manutencao">🔧 Manutenção</a>
    <a href="/relatorios">📊 Relatórios</a>
    <a href="/financeiro">💰 Financeiro</a>

</div>

<div class="content">

    <h2 class="mb-4">Dashboard Operacional</h2>

    <div class="row">

        <div class="col-md-3 mb-3">
            <div class="card card-status">
                <div class="card-body">
                    <h6>Demanda Atual</h6>
                    <div id="demandaAtual" class="valor azul">0 kW</div>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card card-status">
                <div class="card-body">
                    <h6>Potência Disponível</h6>
                    <div id="potenciaDisponivel" class="valor verde">0 kW</div>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card card-status">
                <div class="card-body">
                    <h6>Total de Pivôs</h6>
                    <div id="totalPivos" class="valor">0</div>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card card-status">
                <div class="card-body">
                    <h6>Status Sistema</h6>
                    <div id="statusSistema" class="valor verde">
                        ONLINE
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="row mt-3">

        <div class="col-md-8">

            <div class="card">

                <div class="card-header">
                    📈 Consumo Mensal (kWh)
                </div>

                <div class="card-body">
                    <canvas id="graficoConsumo"></canvas>
                </div>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card">

                <div class="card-header">
                    🟢 Pivôs Ligados
                </div>

                <div class="card-body">

                    <ul id="listaPivos" class="lista-pivos">
                    </ul>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

let graficoConsumo = null;

async function carregarDashboard(){

    try{

        const response = await fetch("/dashboard");

        if(!response.ok){
            throw new Error("Erro ao carregar dashboard");
        }

        const dados = await response.json();

        document.getElementById("demandaAtual").innerText =
            dados.demanda_atual_kw + " kW";

        document.getElementById("potenciaDisponivel").innerText =
            dados.potencia_disponivel_kw + " kW";

        document.getElementById("totalPivos").innerText =
            dados.quantidade_pivos;

        const lista = document.getElementById("listaPivos");

        lista.innerHTML = "";

        if(dados.pivos_ligados.length === 0){

            lista.innerHTML =
                "<li>Nenhum pivô ligado</li>";

        }else{

            dados.pivos_ligados.forEach(nome => {

                lista.innerHTML += `
                    <li>🟢 ${nome}</li>
                `;

            });

        }

    }catch(error){

        console.error(error);

        document.getElementById("statusSistema").innerText =
            "OFFLINE";

        document.getElementById("statusSistema")
            .className = "valor vermelho";
    }

}

async function carregarGrafico(){

    try{

        const response =
            await fetch("/dashboard-anual");

        const dados =
            await response.json();

        const meses = [
            "Jan","Fev","Mar","Abr",
            "Mai","Jun","Jul","Ago",
            "Set","Out","Nov","Dez"
        ];

        if(graficoConsumo){
            graficoConsumo.destroy();
        }

        graficoConsumo = new Chart(
            document.getElementById("graficoConsumo"),
            {
                type:"bar",

                data:{
                    labels: meses,

                    datasets:[{
                        label:"Consumo kWh",
                        data:dados.consumo_mensal,
                        borderWidth:1
                    }]
                },

                options:{
                    responsive:true,
                    maintainAspectRatio:false
                }
            }
        );

    }catch(error){

        console.error(error);

    }

}

carregarDashboard();
carregarGrafico();

setInterval(carregarDashboard,5000);

</script>

</body>
</html>
