<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financeiro - Demand Smart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
    background: #f4f6f9;
    font-family: 'Segoe UI', sans-serif;
}

/* ================= SIDEBAR ================= */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: #0d1b2a;
    color: white;
    padding: 20px;
}

.sidebar h4 {
    margin-bottom: 30px;
    font-weight: 700;
}

.sidebar a {
    display: block;
    color: #cbd5e1;
    text-decoration: none;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 5px;
}

.sidebar a:hover {
    background: #1b263b;
    color: #fff;
}

/* ================= CONTENT ================= */
.content {
    margin-left: 250px;
    padding: 25px;
}

.card-box {
    border: none;
    border-radius: 14px;
    box-shadow: 0 3px 12px rgba(0,0,0,.08);
}

.valor {
    font-size: 1.6rem;
    font-weight: bold;
}

.verde { color: #198754; }
.vermelho { color: #dc3545; }
.azul { color: #0d6efd; }
.amarelo { color: #ffc107; }

h3 {
    font-weight: 700;
}

</style>

</head>

<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">

    <h4>⚡ Demand Smart</h4>

    <a href="/">🏠 Dashboard</a>
    <a href="/pivos">💧 Pivôs</a>
    <a href="/manutencao">🔧 Manutenção</a>
    <a href="/relatorios">📊 Relatórios</a>
    <a href="/financeiro">💰 Financeiro</a>

</div>

<!-- ================= CONTENT ================= -->
<div class="content">

<div class="container-fluid">

<h3 class="mb-4">💰 Financeiro Operacional</h3>

<!-- ================= KPIs ================= -->
<div class="row">

    <div class="col-md-3 mb-3">
        <div class="card card-box p-3">
            <h6>💧 Consumo Energia</h6>
            <div id="consumoAtual" class="valor azul">0 kW</div>
        </div>
    </div>

    <div class="col-md-3 mb-3">
        <div class="card card-box p-3">
            <h6>⚡ Custo Energia</h6>
            <div id="custoEnergia" class="valor vermelho">R$ 0</div>
        </div>
    </div>

    <div class="col-md-3 mb-3">
        <div class="card card-box p-3">
            <h6>🔧 Manutenção</h6>
            <div id="custoManutencao" class="valor amarelo">R$ 0</div>
        </div>
    </div>

    <div class="col-md-3 mb-3">
        <div class="card card-box p-3">
            <h6>🚜 Aquisição Pivôs</h6>
            <div id="custoPivos" class="valor vermelho">R$ 0</div>
        </div>
    </div>

</div>

<!-- ================= TOTAL ================= -->
<div class="row mt-2">

    <div class="col-md-12">
        <div class="card card-box p-3 text-center">

            <h6>💰 Custo Total Operacional</h6>
            <div id="custoTotal" class="valor vermelho">R$ 0</div>

        </div>
    </div>

</div>

<!-- ================= GRÁFICO ================= -->
<div class="row mt-3">

    <div class="col-md-12">
        <div class="card card-box p-3">
            <h6>📊 Comparativo de Custos Mensais</h6>
            <canvas id="graficoFinanceiro"></canvas>
        </div>
    </div>

</div>

</div>
</div>

<!-- ================= SCRIPT ================= -->
<script>

let grafico = null;

async function carregarFinanceiro() {

    const res = await fetch("/dashboard");
    const dados = await res.json();

    const energia = dados.demanda_atual_kw;
    const custoEnergia = energia * 0.75;

    // simulações (depois vem do backend)
    const manutencao = 1850;
    const pivos = 4500;

    const total = custoEnergia + manutencao + pivos;

    document.getElementById("consumoAtual").innerText = energia + " kW";
    document.getElementById("custoEnergia").innerText = "R$ " + custoEnergia.toFixed(2);
    document.getElementById("custoManutencao").innerText = "R$ " + manutencao.toFixed(2);
    document.getElementById("custoPivos").innerText = "R$ " + pivos.toFixed(2);

    document.getElementById("custoTotal").innerText = "R$ " + total.toFixed(2);

}

async function carregarGrafico() {

    const res = await fetch("/dashboard-anual");
    const dados = await res.json();

    const meses = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

    const energia = dados.energia_mensal;
    const manutencao = dados.manutencao_mensal;
    const pivos = dados.pivos_mensal;

    if (grafico) grafico.destroy();

    grafico = new Chart(document.getElementById("graficoFinanceiro"), {
        type: "line",
        data: {
            labels: meses,
            datasets: [
                {
                    label: "Energia",
                    data: energia,
                    borderColor: "#0d6efd"
                },
                {
                    label: "Manutenção",
                    data: manutencao,
                    borderColor: "#ffc107"
                },
                {
                    label: "Aquisição de Pivôs",
                    data: pivos,
                    borderColor: "#dc3545"
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: "bottom" }
            }
        }
    });

}

carregarFinanceiro();
carregarGrafico();

</script>

</body>
</html>
