<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>{% block title %}Demand Smart{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

<style>

:root{
    --primary:#0f172a;
    --secondary:#1e293b;
    --accent:#2563eb;
    --success:#16a34a;
    --bg:#f1f5f9;
    --card:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    font-family:'Segoe UI',sans-serif;
}

/* NAVBAR */
.navbar-custom{
    background:var(--primary);
    box-shadow:0 4px 15px rgba(0,0,0,.12);
    min-height:70px;
}

.navbar-brand{
    color:white !important;
    font-weight:700;
    font-size:1.2rem;
}

.navbar-nav{
    gap:6px;
}

.nav-link{
    color:#cbd5e1 !important;
    font-weight:500;
    padding:10px 14px !important;
    border-radius:10px;
    transition:.25s;
}

.nav-link:hover{
    background:rgba(255,255,255,.08);
    color:white !important;
}

.nav-link.active{
    background:var(--accent);
    color:white !important;
}

/* CONTEÚDO */
.main-content{
    padding:30px;
    margin-top:10px;
}

/* CARDS */
.card{
    border:none;
    border-radius:18px;
    box-shadow:0 5px 18px rgba(0,0,0,.08);
}

/* TITULOS */
.page-title{
    color:var(--primary);
    font-weight:700;
}

.page-subtitle{
    color:#64748b;
    margin-top:-10px;
    margin-bottom:25px;
}

/* RESPONSIVO */
@media (max-width:991px){
    .main-content{ padding:20px; }
    .navbar-nav{ margin-top:15px; }
}

</style>

{% block extra_css %}{% endblock %}

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom">

<div class="container-fluid">

<a class="navbar-brand" href="/">⚡ Demand Smart</a>

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#menuPrincipal">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menuPrincipal">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link {% if request.url.path == '/' %}active{% endif %}" href="/">
<i class="fa-solid fa-house"></i> Dashboard
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if request.url.path == '/gestao-energia' %}active{% endif %}" 
   href="/gestao-energia">
<i class="fa-solid fa-bolt"></i> Gestão de Energia
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if request.url.path == '/pivos' %}active{% endif %}" href="/pivos">
<i class="fa-solid fa-droplet"></i> Pivôs
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if request.url.path == '/manutencao' %}active{% endif %}" href="/manutencao">
<i class="fa-solid fa-screwdriver-wrench"></i> Manutenção
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if request.url.path == '/relatorios' %}active{% endif %}" href="/relatorios">
<i class="fa-solid fa-chart-column"></i> Relatórios
</a>
</li>

<li class="nav-item">
<a class="nav-link {% if request.url.path == '/financeiro' %}active{% endif %}" href="/financeiro">
<i class="fa-solid fa-money-bill-trend-up"></i> Financeiro
</a>
</li>

</ul>

</div>

</div>

</nav>

<div class="main-content">
{% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}

</body>
</html>
